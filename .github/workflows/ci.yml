name: Uqda CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Do not cancel in-progress runs: rapid successive pushes to main would otherwise
# mark healthy runs as "Cancelled" and hide real lint/test results.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"

      # golangci-lint v2.x is built with Go 1.25+ and matches go.mod toolchain (1.25.8).
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2
          args: --timeout=5m

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-linux:
    name: Build (Linux)
    needs: [lint]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"

      - name: Build all packages and binaries
        run: |
          go build -v ./...
          go build -v ./cmd/uqda
          go build -v ./cmd/uqdactl

      - name: Run tests
        run: go test -v ./...

  build-windows:
    name: Build (Windows)
    needs: [lint]
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"

      - name: Build all packages and binaries
        run: |
          go build -v ./...
          go build -v ./cmd/uqda
          go build -v ./cmd/uqdactl

      - name: Run tests
        run: go test -v ./...

  build-macos:
    name: Build (macOS)
    needs: [lint]
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"

      - name: Build all packages and binaries
        run: |
          go build -v ./...
          go build -v ./cmd/uqda
          go build -v ./cmd/uqdactl

      - name: Run tests
        run: go test -v ./...

  all-tests-passed:
    name: ✅ All Tests Passed
    needs: [lint, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Verify all jobs succeeded
        run: echo "All tests passed successfully!"
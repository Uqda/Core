# Pushes multi-arch images to ghcr.io/<owner>/<repo> (all lowercase).
#
# If push returns 403 for an ORGANIZATION repo:
# 1) Org → Settings → Actions → General → Workflow permissions → Read and write.
# 2) Org → Settings → Packages → allow Actions to publish / inherit from repo.
# 3) Add a repo secret GHCR_PUSH_TOKEN (classic PAT: write:packages, read:packages).
#    Optional: GHCR_USERNAME = GitHub login that owns the PAT (defaults to github.actor).

name: Docker Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-docker:
    name: Build Docker Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # GHCR rejects mixed-case paths (e.g. Uqda/Core → 403 on blob upload).
      - name: GHCR image name (lowercase)
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN + github.actor often gets 403 on org-owned GHCR namespaces.
      # PAT via GHCR_PUSH_TOKEN is the reliable fix; else try owner + GITHUB_TOKEN.
      - name: Log in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PUSH_TOKEN: ${{ secrets.GHCR_PUSH_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -euo pipefail
          if [ -n "${GHCR_PUSH_TOKEN:-}" ]; then
            USER="${GHCR_USERNAME:-${{ github.actor }}}"
            echo "Logging in to ghcr.io as ${USER} (PAT secret)."
            echo "$GHCR_PUSH_TOKEN" | docker login ghcr.io -u "$USER" --password-stdin
          else
            echo "Logging in to ghcr.io as ${{ github.repository_owner }} (GITHUB_TOKEN)."
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        id: docker_build
        with:
          context: .
          file: ./contrib/docker/Dockerfile.multiarch
          platforms: linux/amd64,linux/arm64,linux/armhf,linux/armel
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

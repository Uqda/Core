# Pushes multi-arch images to ghcr.io/<owner>/<repo> (all lowercase).
# If push still returns 403: org → Settings → Actions → General → Workflow permissions
# must allow read/write; org may also need Packages policy to let Actions publish.

name: Docker Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-docker:
    name: Build Docker Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # GHCR rejects mixed-case paths (e.g. Uqda/Core → 403 on blob upload).
      - name: GHCR image name (lowercase)
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        id: docker_build
        with:
          context: .
          file: ./contrib/docker/Dockerfile.multiarch
          platforms: linux/amd64,linux/arm64,linux/armhf,linux/armel
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
